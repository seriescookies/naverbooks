<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  const path = location.pathname.replace(/^\//, '').trim();
  if (/^\d{5}$/.test(path)) {
    location.href = "naverbooks://event?eventNo=" + path;
  } else if (/^\d{6}$/.test(path)) {
    location.href = "naverbooks://titleEnd?contentId=" + path;
  } else {
    document.write("잘못된 링크: " + path);
  }
</script>
</body>
</html>
